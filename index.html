<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Time Is It There Now?</title>
    <style>
body {
            margin: 0;
            padding: 0;

            background: url('https://github.com/user-attachments/assets/3cc62878-f1d1-473e-adea-76052f8d8f3c') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(15, 15, 26, 0.75);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #00adb5;
        }
        p {
            font-size: 14px;
            color: #eeeeee;
            margin-bottom: 30px;
        }
        .status-text {
            font-style: italic;
            color: #ff8787;
            margin-top: 15px;
            font-size: 13px;
        }
        audio {
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>What Time Is It There Now?</h1>
        <p>Bay gio ben đo la may gio? — Tiger Huang (黃小琥)</p>
        
<!---trình phát nhạc--->
        <audio id="musicPlayer" autoplay loop controls>
    <source src="music.mp3" type="audio/mpeg">
    Trình duyệt của bạn không hỗ trợ phát âm thanh.
</audio>

        <p id="status" class="status-text">Đang cố gắng tự động phát nhạc...</p>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('musicPlayer');
            const status = document.getElementById('status');

            
            audio.play().then(() => {
                status.textContent = "🎵 Đang hát cho em nghe nè...";
                status.style.color = "#5aa371";
            }).catch(error => {
                
                status.textContent = "⚡ Bấm vô bất cứ đâu để nghe nha.";
              
                                
                document.addEventListener('click', () => {
                    audio.play();
                    status.textContent = "🎵 Đang hát cho em nghe nè...";
                    status.style.color = "#3eb9a8";
                }, { once: true }); 
            });
        });
    </script>

</body>
</html>
